version: '3.8'

services:
  api:
    build: .
    container_name: rag_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      # Explicitly tell the API to look for qdrant at the container name instead of localhost
      - QDRANT_HOST=qdrant
      # Pass the Groq API key from the host environment to the container
      - GROQ_API_KEY=${GROQ_API_KEY}
    depends_on:
      - qdrant
    deploy:
      resources:
        limits:
          cpus: '0.5' # Limit to half a core to leave room for Qdrant/OS
          memory: 512M # Tight limit for 1GB Free Tier instance

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant_prod
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC API
    volumes:
      - ./qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__MAX_REQUEST_SIZE_MB=50
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 256M
