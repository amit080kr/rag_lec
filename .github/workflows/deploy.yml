name: Deploy RAG Pipeline to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Setup Project Directory
            if [ ! -d "rag_lec" ]; then
              git clone https://github.com/${{ github.repository }}.git rag_lec
            fi
            cd rag_lec
            git pull origin main
            
            # 2. Inject Secrets into .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            
            # 3. Start Qdrant first (creates the network)
            docker compose up -d qdrant
            
            # 4. Wait for Qdrant to be ready and Run Initialization
            # This ensures the collection and indexes are created automatically
            echo "Waiting for Qdrant to initialize..."
            sleep 10
            docker run --rm \
              -v $(pwd):/app \
              -w /app \
              --network rag_lec_default \
              python:3.11-slim \
              bash -c "pip install qdrant-client fastembed && QDRANT_HOST=qdrant python qdrant_initializer.py"
            
            # 5. Start the API with production rebuild
            docker compose up -d --build api

