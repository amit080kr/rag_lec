name: Deploy RAG Pipeline to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Clone or pull latest code
            if [ ! -d "rag_lec" ]; then
              git clone https://github.com/${{ github.repository }}.git rag_lec
            fi
            cd rag_lec
            git pull origin main
            
            # Use GitHub Secrets to securely generate the .env file directly on the EC2 server.
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            
            # 1. Start the Qdrant database first
            docker compose up -d qdrant
            
            # 2. Automatically initialize the collection (only runs if not already setup)
            # We wait 15 seconds for Qdrant to boot up
            sleep 15
            docker run --rm -v $(pwd):/app -w /app --network rag_lec_default python:3.11-slim bash -c "pip install qdrant-client fastembed && QDRANT_HOST=qdrant python qdrant_initializer.py"
            
            # 3. Rebuild and start the FastAPI application
            docker compose up -d --build api

