name: Deploy RAG Pipeline to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 60m
          script: |
            # 1. Setup Project Directory (Force sync with GitHub)
            if [ ! -d "rag_lec" ]; then
              git clone https://github.com/${{ github.repository }}.git rag_lec
            fi
            cd rag_lec
            git fetch origin main
            git reset --hard origin/main
            
            # 2. Inject Secrets into .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            
            # 3. Start Qdrant first (creates the network)
            docker compose up -d qdrant
            
            # 4. Build the API container first so we don't have to download dependencies twice
            docker compose build api
            
            # 5. Wait for Qdrant to be ready and Run Initialization using the built image
            echo "Waiting for Qdrant to initialize..."
            sleep 10
            docker compose run --rm api python qdrant_initializer.py
            
            # 6. Start the API
            docker compose up -d api

